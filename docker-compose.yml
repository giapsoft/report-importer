services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: report
      POSTGRES_PASSWORD: report
      POSTGRES_DB: report_importer
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report -d report_importer"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://report:report@db:5432/report_importer
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
        VITE_BASE: /
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
